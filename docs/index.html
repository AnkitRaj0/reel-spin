<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | RandomSpin</title>
  <style>
    /* Force the body to take up the full screen and remove scrollbars */
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #231F20;
    }

    /* Make the canvas fill the browser window */
    #unity-canvas {
      width: 100vw !important;
      height: 100vh !important;
      display: block;
    }
  </style>
</head>

<body>
  <canvas id="unity-canvas" tabindex="-1"></canvas>

  <script src="Build/docs.loader.js"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");

    // Setup configuration - keeping your specific build paths
    const config = {
      arguments: [],
      dataUrl: "Build/docs.data",
      frameworkUrl: "Build/docs.framework.js",
      codeUrl: "Build/docs.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "RandomSpin",
      productVersion: "1.0",
    };

    createUnityInstance(canvas, config).then((unityInstance) => {
      // Optional: Ensure Unity updates its internal resolution when window is resized
      window.addEventListener('resize', () => {
        // Some builds need an explicit call, but CSS 100vw/vh usually handles it
      });
    }).catch((message) => {
      alert(message);
    });
  </script>
</body>

</html>
